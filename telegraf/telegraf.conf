
# Fuentes:
# https://docs.influxdata.com/telegraf/v1/configuration/
# https://www.cncf.io/blog/2022/06/10/docker-monitoring-tutorial-how-to-monitor-docker-with-telegraf-and-influxdb/
[agent]
  # Cada cuánto se recolectan las métricas. 10s es un buen balance entre
  # granularidad y carga sobre el sistema y la base de datos.
  interval = "10s"

  # Si es true, Telegraf espera al siguiente múltiplo del intervalo
  # (ej: :00, :10, :20...) en lugar de empezar en un momento arbitrario.
  # Esto hace los datos más predecibles y fáciles de graficar.
  round_interval = true

  # Nombre del host que aparecerá como tag en InfluxDB.
  # $HOSTNAME viene de la variable de entorno que definimos en el compose.
  hostname = "$HOSTNAME"

  # Si Telegraf no puede conectarse al output (InfluxDB), acumula hasta
  # 10000 métricas en memoria antes de descartarlas.
  metric_buffer_limit = 10000

  # Intervalo de flush: cada cuánto se intentan enviar los datos al output.
  # Debe ser mayor o igual al interval.
  flush_interval = "10s"

# ─── OUTPUT: a dónde enviar los datos ────────────────────────────────────────
# Fuente: https://docs.influxdata.com/telegraf/v1/plugins/#output-plugins
[[outputs.influxdb_v2]]
  # Nota: usamos outputs.influxdb_v2 (con _v2) y no outputs.influxdb,
  # porque el plugin sin sufijo es para InfluxDB 1.x que usa una API distinta.
  urls = ["${INFLUXDB_URL}"]

  # El token se lee de la variable de entorno, no está hardcodeado aquí.
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"

  # Tiempo máximo de espera para una conexión al output
  timeout = "5s"

# ─── INPUTS: qué métricas recolectar ─────────────────────────────────────────

# CPU
# Fuente del plugin: https://github.com/influxdata/telegraf/tree/master/plugins/inputs/cpu
# Lee de /proc/stat en Linux. Genera la measurement "cpu".
# Tags: host, cpu (ej: "cpu0", "cpu1", "cpu-total")
# Fields principales: usage_percent, usage_idle, usage_user, usage_system
[[inputs.cpu]]
  percpu = true       # Métricas individuales por núcleo (cpu0, cpu1, etc.)
  totalcpu = true     # Agrega el total (cpu-total) — este es el que más usarás en dashboards
  collect_cpu_time = false  # Los tiempos absolutos (user_time, etc.) no los necesitamos
  report_active = false     # usage_active es redundante con usage_percent

# MEMORIA RAM
# Fuente del plugin: https://github.com/influxdata/telegraf/tree/master/plugins/inputs/mem
# Lee de /proc/meminfo. Genera la measurement "mem".
# Fields principales: used_percent, available, used, total, cached, buffered
[[inputs.mem]]
  # No tiene opciones configurables, lee todo por defecto

# DISCO
# Fuente del plugin: https://github.com/influxdata/telegraf/tree/master/plugins/inputs/disk
# Lee de /proc/mounts y syscall statfs(). Genera la measurement "disk".
# Tags: host, path (punto de montaje, ej: "/"), fstype
# Fields principales: used_percent, used, free, total
[[inputs.disk]]
  # Ignoramos filesystems virtuales que no representan almacenamiento real.
  # Sin esto, aparecería una entrada por cada overlay de Docker, por ejemplo.
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# I/O DE DISCO
# Fuente del plugin: https://github.com/influxdata/telegraf/tree/master/plugins/inputs/diskio
# Lee de /proc/diskstats. Genera la measurement "diskio".
# Fields principales: reads, writes, read_bytes, write_bytes, io_time
[[inputs.diskio]]

# RED
# Fuente del plugin: https://github.com/influxdata/telegraf/tree/master/plugins/inputs/net
# Lee de /proc/net/dev. Genera la measurement "net".
# Tags: host, interface (ej: "eth0")
# Fields principales: bytes_recv, bytes_sent, packets_recv, packets_sent
[[inputs.net]]
  # Sin configuración extra, lee todas las interfaces por defecto

# SISTEMA — carga y uptime
# Fuente del plugin: https://github.com/influxdata/telegraf/tree/master/plugins/inputs/system
# Lee varios archivos de /proc. Genera la measurement "system".
# Fields principales: load1, load5, load15 (load average), uptime, uptime_format
[[inputs.system]]

# PROCESOS
# Fuente del plugin: https://github.com/influxdata/telegraf/tree/master/plugins/inputs/processes
# Lee de /proc. Genera la measurement "processes".
# Fields principales: running, sleeping, stopped, total
[[inputs.processes]]